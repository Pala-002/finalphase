{% extends "base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<div id="digitspan-container" class="text-center">
    <div id="instructions">
        <p>Memoriza la secuencia de números que aparecerá y repítela en el mismo orden (Forward) o orden inverso (Backward).</p>
        <button id="start-forward" class="btn btn-primary btn-lg me-2">Forward</button>
        <button id="start-backward" class="btn btn-secondary btn-lg">Backward</button>
    </div>
    <div id="test-area" class="d-none">
        <h1 id="sequence" class="display-4 my-4"></h1>
        <input type="text" id="user-input" class="form-control form-control-lg w-50 mx-auto" placeholder="Ingresa la secuencia">
        <button id="submit-answer" class="btn btn-success mt-3">Enviar</button>
        <p class="mt-3">Nivel: <span id="level">3</span> dígitos</p>
    </div>
    <div id="complete" class="d-none">
        <h3>¡Test Completado!</h3>
        <p>Span máximo: <span id="max-span"></span></p>
        <a href="{{ url_for('cognitive.test_selection') }}" class="btn btn-primary">Volver</a>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/digitspan.js') }}"></script>
{% endblock %}
