{% extends "base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<div class="row mb-4">
    <div class="col-md-4"><div class="card"><div class="card-body"><h5>Usuarios</h5><p class="display-4">{{ total_users }}</p></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body"><h5>Sesiones</h5><p class="display-4">{{ total_sessions }}</p></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body"><h5>Behavior Logs</h5><p class="display-4">{{ total_behavior_logs }}</p></div></div></div>
</div>
<div class="list-group">
    <a href="{{ url_for('admin.manage_users') }}" class="list-group-item list-group-item-action">Gestión de Usuarios</a>
    <a href="{{ url_for('admin.view_logs') }}" class="list-group-item list-group-item-action">Ver Logs</a>
    <a href="{{ url_for('admin.manage_sessions') }}" class="list-group-item list-group-item-action">Sesiones</a>
    <a href="{{ url_for('admin.backup') }}" class="list-group-item list-group-item-action">Respaldos</a>
</div>
{% endblock %}
