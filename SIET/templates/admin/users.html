{% extends "base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<table class="table table-striped">
    <thead><tr><th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr></thead>
    <tbody>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role.name }}</td>
        <td>{{ 'Sí' if user.is_active else 'No' }}</td>
        <td><a href="{{ url_for('admin.edit_user', user_id=user.id) }}" class="btn btn-sm btn-primary">Editar</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
